<div class="background">
    <div class="topContainer">
        <div id="icon">
            <slot name="c1"></slot>
        </div>
        <div class="classContainer">
            <p id="typeText"></p>
            <p id="baseTypeText"></p>
        </div>
    </div>
    <input type="text" id="nameInput" spellcheck="false">
    <hr>
    <div class="enableControll">
        <label class="boolSelect">
            <p>Enable</p>
            <input id="enableCheckbox" type="checkbox">
            <span class="checkmark"></span>
        </label>
        <label class="boolSelect">
            <p>Visible</p>
            <input id="visibleCheckbox" type="checkbox">
            <span class="checkmark"></span>
        </label>
        <label class="boolSelect">
            <p>Hidden</p>
            <input id="hiddenCheckbox" type="checkbox">
            <span class="checkmark"></span>
        </label>
    </div>
</div>

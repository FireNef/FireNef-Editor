<div class="background">
    <div class="topBar">
        <button id="close">
            <svg width="12" height="12" viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg">
                <line x1="3" y1="3" x2="9" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="9" y1="3" x2="3" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
        </button>
    </div>
    <div class="main">
        <div class="colorInput">
            <div id="svContainer">
                <canvas id="sv"></canvas>
                <div id="selector"></div>
            </div>
            <input type="range" id="hue" min="0" max="360">
        </div>

        <div id="preview"></div>
        <input type="text" id="hexInput"></input>

        <div class="buttons">
            <button id="confirm">Confirm</button>
            <button id="cancel">Cancel</button>
        </div>
    </div>
</div>
